<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexbox</title>

    <style>
       
         h1
         {
            background-color: black;
            color: white;
            margin: 2px;
            padding: 5px;
         }

         div
         {
            display: flex;
            flex-direction: row;
            background-color: greenyellow;
            padding: 10px;
            /* flex-wrap: wrap; */
            justify-content:space-around;
         }

    </style>
</head>
<body>
    <div>
         <h1>one</h1>
         <h1>two</h1>
         <h1>three</h1>
    </div>
</body>
</html>
