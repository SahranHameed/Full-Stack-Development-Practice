        /* Min-Width Prectice */
        div
        {
            background-color: black;
            height: 100px;
        }

        @media screen and (min-width:400px)
        {
            div{
                background-color: red;
            }
        }

        @media screen and (min-width:600px)
        {
            div{
                background-color: blue;
            }
        }

        @media screen and (min-width:800px)
        {
            div{
                background-color: yellow;
            }
